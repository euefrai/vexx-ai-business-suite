services:
  - type: web
    name: vexx-ai-business-suite
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: cd backend && gunicorn -w 4 -b 0.0.0.0:$PORT "main:create_app('production')"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
