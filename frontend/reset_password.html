<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir senha — VEXX AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/auth.css">
  <style>
    .pw-bar { height: 4px; background: var(--surface-lg); border-radius: 99px; overflow: hidden; margin-top: 8px; }
    .pw-fill { height: 100%; width: 0%; transition: width .25s, background .25s; background: var(--red); border-radius: 99px; }
    .pw-fill.s2 { background: var(--amber); }
    .pw-fill.s3 { background: var(--blue); }
    .pw-fill.s4 { background: var(--green); }
    .pw-hints span.met { color: var(--green); }
    .pw-hints span.met::before { content: '✓ '; }
    .pw-hints span:not(.met)::before { content: '○ '; }
    .pw-hints span:not(.met) { color: var(--text-faint); }
  </style>
</head>
<body class="auth-body">

  <header class="auth-header">
    <a href="/" class="auth-logo">
      <div class="auth-logo-badge">V</div>
      <span>VEXX AI</span>
    </a>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-card-header">
        <h1>Nova senha</h1>
        <p>Defina uma nova senha forte para sua conta.</p>
      </div>

      <div class="auth-error" id="auth-error"></div>
      <div class="auth-error" id="auth-success" style="background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.2);color:#10b981;display:none"></div>

      <form id="reset-form" autocomplete="off" onsubmit="return false;">
        <input type="hidden" id="reset-token" value="{{ token }}">

        <div class="form-group">
          <label class="form-label" for="pw-input">Nova senha</label>
          <input type="password" class="form-input" id="pw-input"
                 placeholder="Mínimo 8 caracteres com letra e número" required minlength="8"
                 autocomplete="new-password">
          <div class="pw-meter" id="pw-meter" style="display:none;margin-top:8px">
            <div class="pw-bar"><div class="pw-fill" id="pw-fill"></div></div>
            <div class="pw-hints" id="pw-hints" style="font-size:.7rem;color:var(--text-faint);margin-top:6px;line-height:1.5">
              <span data-rule="length">○ 8+ caracteres</span> ·
              <span data-rule="letter">○ uma letra</span> ·
              <span data-rule="number">○ um número</span> ·
              <span data-rule="upper">○ maiúscula</span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="pw-confirm">Confirme a senha</label>
          <input type="password" class="form-input" id="pw-confirm"
                 placeholder="Digite novamente" required>
        </div>

        <button type="button" class="btn btn-primary btn-full btn-lg" id="submit-btn" style="margin-top:8px">
          Redefinir senha
        </button>
      </form>

      <div class="auth-footer-link">
        <a href="/login">Voltar ao login</a>
      </div>
    </div>
  </main>

  <script>
    (function() {
      const $ = id => document.getElementById(id);
      const tokenEl   = $('reset-token');
      const pwEl      = $('pw-input');
      const confirmEl = $('pw-confirm');
      const meterEl   = $('pw-meter');
      const fillEl    = $('pw-fill');
      const hintsEl   = $('pw-hints');
      const errEl     = $('auth-error');
      const okEl      = $('auth-success');
      const btn       = $('submit-btn');

      // Strength meter
      pwEl.addEventListener('input', () => {
        const v = pwEl.value;
        if (!v) { meterEl.style.display = 'none'; return; }
        meterEl.style.display = '';
        const rules = {
          length: v.length >= 8,
          letter: /[a-zA-Z]/.test(v),
          number: /[0-9]/.test(v),
          upper:  /[A-Z]/.test(v) && /[a-z]/.test(v),
        };
        hintsEl.querySelectorAll('span[data-rule]').forEach(el => {
          el.classList.toggle('met', rules[el.dataset.rule]);
        });
        let score = 0;
        if (rules.length) score++;
        if (v.length >= 12) score++;
        if (rules.upper) score++;
        if (rules.number) score++;
        if (/[^a-zA-Z0-9]/.test(v)) score++;
        score = Math.min(score, 4);
        fillEl.className = 'pw-fill s' + score;
        fillEl.style.width = (score * 25) + '%';
      });

      async function submit() {
        if (btn.disabled) return;
        if (pwEl.value !== confirmEl.value) {
          errEl.textContent = 'As senhas não coincidem.';
          errEl.classList.add('show'); errEl.style.display = 'block';
          return;
        }

        errEl.classList.remove('show'); errEl.style.display='none';
        okEl.style.display='none';
        btn.disabled = true; btn.textContent = 'Redefinindo...';

        let csrf = document.querySelector('meta[name="csrf-token"]')?.content || '';
        if (!csrf) {
          try { csrf = (await (await fetch('/api/csrf', {credentials:'include'})).json()).token || ''; } catch {}
        }

        try {
          const r = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: {'Content-Type':'application/json','X-CSRFToken':csrf},
            credentials: 'include',
            body: JSON.stringify({ token: tokenEl.value, new_password: pwEl.value }),
          });
          const j = await r.json().catch(() => ({}));

          if (r.ok && j.success) {
            okEl.textContent = j.message || 'Senha redefinida!';
            okEl.style.display = 'block';
            setTimeout(() => window.location.href = '/login', 1800);
          } else {
            errEl.textContent = j.error || 'Erro inesperado.';
            errEl.classList.add('show'); errEl.style.display = 'block';
            btn.disabled = false; btn.textContent = 'Redefinir senha';
          }
        } catch (err) {
          errEl.textContent = 'Erro de conexão.';
          errEl.classList.add('show'); errEl.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Redefinir senha';
        }
      }

      btn.addEventListener('click', e => { e.preventDefault(); submit(); });
    })();
  </script>
</body>
</html>
