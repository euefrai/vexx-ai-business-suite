<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci a senha — VEXX AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-body">

  <header class="auth-header">
    <a href="/" class="auth-logo">
      <div class="auth-logo-badge">V</div>
      <span>VEXX AI</span>
    </a>
    <a href="/login" class="btn btn-secondary btn-sm">Voltar ao login</a>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-card-header">
        <h1>Esqueceu a senha?</h1>
        <p>Sem problema. Digite seu email e enviaremos um link para redefinir.</p>
      </div>

      <div class="auth-error" id="auth-error"></div>
      <div class="auth-error" id="auth-success" style="background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.2);color:#10b981;display:none"></div>

      <form id="forgot-form" autocomplete="on" onsubmit="return false;">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" class="form-input" name="email" id="email"
                 placeholder="voce@empresa.com" required autocomplete="email">
        </div>

        <button type="button" class="btn btn-primary btn-full btn-lg" id="submit-btn" style="margin-top:8px">
          Enviar link de redefinição
        </button>
      </form>

      <div class="auth-footer-link">
        Lembrou a senha? <a href="/login">Fazer login</a>
      </div>
    </div>
  </main>

  <script>
    (function() {
      const $ = id => document.getElementById(id);
      const emailEl   = $('email');
      const errEl     = $('auth-error');
      const okEl      = $('auth-success');
      const btn       = $('submit-btn');

      async function submit() {
        if (btn.disabled) return;
        if (!emailEl.value) { emailEl.focus(); return; }

        errEl.classList.remove('show'); errEl.style.display='none';
        okEl.style.display='none';
        btn.disabled = true; btn.textContent = 'Enviando...';

        let csrf = document.querySelector('meta[name="csrf-token"]')?.content || '';
        if (!csrf) {
          try { csrf = (await (await fetch('/api/csrf', {credentials:'include'})).json()).token || ''; } catch {}
        }

        try {
          const r = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: {'Content-Type':'application/json','X-CSRFToken':csrf},
            credentials: 'include',
            body: JSON.stringify({ email: emailEl.value }),
          });
          const j = await r.json().catch(() => ({}));

          if (r.ok && j.success) {
            okEl.textContent = j.message || 'Verifique seu email.';
            okEl.style.display = 'block';
            emailEl.value = '';
          } else {
            errEl.textContent = j.error || 'Erro inesperado.';
            errEl.classList.add('show'); errEl.style.display = 'block';
          }
        } catch (err) {
          errEl.textContent = 'Erro de conexão.';
          errEl.classList.add('show'); errEl.style.display = 'block';
        } finally {
          btn.disabled = false; btn.textContent = 'Enviar link de redefinição';
        }
      }

      btn.addEventListener('click', e => { e.preventDefault(); submit(); });
      emailEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); submit(); }
      });
    })();
  </script>
</body>
</html>
